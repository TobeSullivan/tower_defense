# Wend meta backend — self-hosted Nakama + Postgres (notes/multiplayer_architecture.md §1,
# notes/server_decision.md). Runs alongside the headless Godot match server on the Hetzner
# box. Nakama is the META layer (identity, leaderboards, LP/seasons, matchmaking) — NOT the
# match authority (that stays in the Godot server; see notes/remote_beta_plan.md).
#
# Secrets come from a gitignored .env (copy .env.example). Bring up: `docker compose up -d`.
services:
  postgres:
    image: postgres:16-alpine
    container_name: wend-postgres
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Postgres is reachable only inside the compose network — never expose 5432 publicly.
    expose:
      - "5432"

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0
    container_name: wend-nakama
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
          --database.address postgres:${POSTGRES_PASSWORD}@postgres:5432/nakama &&
        exec /nakama/nakama
          --database.address postgres:${POSTGRES_PASSWORD}@postgres:5432/nakama
          --name wend-nakama
          --logger.level INFO
          --session.token_expiry_sec 1209600
          --socket.server_key "${NAKAMA_SERVER_KEY:?set NAKAMA_SERVER_KEY in .env}"
          --console.username "${NAKAMA_CONSOLE_USER:?set NAKAMA_CONSOLE_USER in .env}"
          --console.password "${NAKAMA_CONSOLE_PASSWORD:?set NAKAMA_CONSOLE_PASSWORD in .env}"
          --runtime.js_entrypoint "index.js"
    volumes:
      # Runtime modules load from /nakama/data/modules; index.js (js_entrypoint) lives there.
      - ./data:/nakama/data
    ports:
      - "7349:7349"   # gRPC API
      - "7350:7350"   # client API (HTTP + WebSocket) — the Godot client connects here
      - "7351:7351"   # developer console (lock down / firewall to your IP)
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
